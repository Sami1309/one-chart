<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Objects in the Universe</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          cream: '#faf8f5',
          'cream-dark': '#faf5f0',
          accent: '#b33',
        }
      }
    }
  }
</script>
<style>
  /* Chart-specific styles that Tailwind can't handle (SVG tooltips, dynamic positioning) */
  /* Tooltip base */
  .tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(255,255,255,0.97);
    border: 1px solid #c44;
    border-radius: 8px;
    padding: 0;
    font-size: 12px;
    line-height: 1.5;
    max-width: 340px;
    color: #222;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    opacity: 0;
  }
  .tooltip.tt-visible {
    opacity: 1;
  }
  .tooltip .tt-body { padding: 10px 13px; }
  .tooltip .tt-title { font-weight: 700; color: #b33; font-size: 13px; margin-bottom: 3px; }
  .tooltip .tt-data { color: #666; font-size: 11px; }
  .tooltip .tt-desc { margin-top: 4px; font-size: 11px; color: #444; }

  /* Tooltip image */
  .tooltip .tt-wiki-img {
    display: block;
    object-fit: cover;
  }
  .tooltip.tt-layout-top .tt-wiki-img {
    width: 100%;
    max-height: 140px;
    border-radius: 8px 8px 0 0;
  }
  .tooltip.tt-layout-side {
    display: flex;
    max-width: 440px;
  }
  .tooltip.tt-layout-side .tt-wiki-img {
    width: 140px;
    min-height: 180px;
    flex-shrink: 0;
    align-self: stretch;
    border-radius: 8px 0 0 8px;
  }
  .tooltip.tt-layout-side .tt-content {
    flex: 1;
    min-width: 0;
  }
  .tooltip .tt-wiki-link {
    margin-top: 5px;
    font-size: 10px;
    color: #3366cc;
    font-style: italic;
  }

  /* Hover ring animation on object dots */
  @keyframes pulseRing {
    0% { r: 8; opacity: 0.5; }
    100% { r: 18; opacity: 0; }
  }
  .hover-ring {
    fill: none;
    stroke-width: 1.5;
    pointer-events: none;
    animation: pulseRing 0.8s ease-out infinite;
  }
  .detail-panel {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.98);
    border: 2px solid #b33;
    border-radius: 8px;
    padding: 22px 26px;
    max-width: 480px;
    width: 90%;
    z-index: 200;
    box-shadow: 0 6px 30px rgba(0,0,0,0.3);
    display: none;
  }
  .detail-panel .close-btn {
    position: absolute; top: 6px; right: 12px;
    background: none; border: none; color: #b33; font-size: 22px; cursor: pointer;
  }
  .detail-panel h2 { color: #b33; font-size: 17px; margin-bottom: 6px; }
  .detail-panel .detail-data { font-size: 12px; color: #666; margin-bottom: 8px; line-height: 1.6; }
  .detail-panel .detail-text { font-size: 13px; line-height: 1.6; color: #333; }

  /* Legend interactivity */
  .legend-item { cursor: pointer; transition: opacity 0.15s; }
  .legend-item:hover { opacity: 0.7; }

  /* Dark mode */
  body.dark-mode { background: #080c18; color: #c8d0e0; }
  body.dark-mode nav { background: #0d1225; border-color: #1a2040; }
  body.dark-mode nav a { color: #7888aa; }
  body.dark-mode nav .text-gray-700 { color: #7888aa; }
  body.dark-mode nav .text-gray-500 { color: #5a6a90; }
  body.dark-mode nav .text-gray-400 { color: #4a5a80; }
  body.dark-mode nav select,
  body.dark-mode nav button { background: #151d35; color: #7888aa; border-color: #1e2a50; }
  body.dark-mode nav select:hover,
  body.dark-mode nav button:hover { background: #1a2545; }
  body.dark-mode #chart-container { background: #080c18; }
  body.dark-mode .tooltip { background: rgba(12,16,35,0.96); border-color: #334488; color: #bcc8e0; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
  body.dark-mode .tooltip .tt-title { color: #7799cc; }
  body.dark-mode .tooltip .tt-data { color: #7888aa; }
  body.dark-mode .tooltip .tt-desc { color: #8899aa; }
  body.dark-mode .tooltip .tt-wiki-link { color: #6688bb; }
  body.dark-mode .legend-box { background: rgba(10,14,28,0.92); border-color: #1e2a50; color: #7888aa; }
  body.dark-mode .legend-box h3 { color: #7799cc; }
  body.dark-mode .legend-box .legend-swatch { border-color: #334466; }
  body.dark-mode .hint-bar { color: #3a4a6a; }
  body.dark-mode .detail-panel { background: rgba(12,16,35,0.98); border-color: #334488; }
  body.dark-mode .detail-panel h2 { color: #7799cc; }
  body.dark-mode .detail-panel .detail-data { color: #7888aa; }
  body.dark-mode .detail-panel .detail-text { color: #8899aa; }
  body.dark-mode .detail-panel .close-btn { color: #7799cc; }
  body.dark-mode #slideshow-overlay > div { background: #111830; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
  body.dark-mode #slideshow-overlay #slide-title { color: #c8d0e0; }
  body.dark-mode #slideshow-overlay #slide-text { color: #8899aa; }
  body.dark-mode #slideshow-overlay #slide-skip,
  body.dark-mode #slideshow-overlay #slide-prev { color: #5a6a90; }
  body.dark-mode #slideshow-overlay .bg-gray-300 { background-color: #2a3660; }
  body.dark-mode #help-overlay > div { background: #111830; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
  body.dark-mode #help-overlay .text-gray-800 { color: #c8d0e0; }
  body.dark-mode #help-overlay .text-gray-600 { color: #7888aa; }
  body.dark-mode #help-overlay .text-gray-400 { color: #5a6a90; }
  body.dark-mode #help-overlay .border-gray-100 { border-color: #1e2a50; }
  body.dark-mode #help-overlay .text-xs { color: #4a5a80; }
</style>
</head>
<body class="bg-cream text-gray-900 overflow-hidden h-screen font-['Helvetica_Neue',Arial,sans-serif]">
<div id="app" class="flex flex-col h-screen">

  <!-- Navigation -->
  <nav class="px-5 py-1.5 bg-white border-b border-gray-300 flex items-center justify-between flex-shrink-0 z-20">
    <div class="flex items-baseline gap-3">
      <a href="index.html" class="text-[15px] font-bold text-gray-700 hover:text-accent transition-colors">All Objects and Some Questions</a>
      <span class="text-[11px] text-gray-400">Lineweaver &amp; Patel, Am. J. Phys. 91, 819 (2023)</span>
    </div>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2.5">
        <label class="text-[11px] text-gray-500 cursor-pointer flex items-center gap-1">X:
          <select id="xScaleCtrl" class="text-[11px] px-2 py-0.5 bg-gray-100 text-gray-700 border border-gray-300 rounded cursor-pointer">
            <option value="log" selected>Log</option>
            <option value="linear">Linear</option>
          </select>
        </label>
        <label class="text-[11px] text-gray-500 cursor-pointer flex items-center gap-1">Y:
          <select id="yScaleCtrl" class="text-[11px] px-2 py-0.5 bg-gray-100 text-gray-700 border border-gray-300 rounded cursor-pointer">
            <option value="log" selected>Log</option>
            <option value="linear">Linear</option>
          </select>
        </label>
        <button id="resetZoom" class="text-[11px] px-2 py-0.5 bg-gray-100 text-gray-700 border border-gray-300 rounded cursor-pointer hover:bg-gray-200 transition-colors">Reset View</button>
        <button id="toggleLabels" class="text-[11px] px-2 py-0.5 bg-gray-100 text-gray-700 border border-gray-300 rounded cursor-pointer hover:bg-gray-200 transition-colors">Labels On/Off</button>
      </div>
      <div class="h-4 w-px bg-gray-300"></div>
      <button id="darkModeToggle" class="text-[11px] px-2 py-0.5 bg-gray-100 text-gray-700 border border-gray-300 rounded cursor-pointer hover:bg-gray-200 transition-colors">Dark Mode</button>
      <button id="tour-btn" class="text-[11px] px-2 py-0.5 bg-gray-100 text-gray-700 border border-gray-300 rounded cursor-pointer hover:bg-gray-200 transition-colors">Tour</button>
      <a href="about.html" class="text-[11px] text-gray-500 hover:text-accent transition-colors">About</a>
    </div>
  </nav>

  <!-- Chart -->
  <div id="chart-container" class="flex-1 relative overflow-hidden bg-white">
    <div class="tooltip" id="tooltip"></div>
    <div class="detail-panel" id="detailPanel">
      <button class="close-btn" id="closeDetail">&times;</button>
      <h2 id="detailTitle"></h2>
      <div class="detail-data" id="detailData"></div>
      <div class="detail-text" id="detailText"></div>
    </div>
    <div class="legend-box absolute bottom-14 right-[90px] bg-white/90 border border-gray-400 rounded-[5px] px-3 py-2 text-[10px] z-10">
      <h3 class="text-[11px] mb-1 text-accent font-bold">Domination</h3>
      <div class="legend-item flex items-center gap-1.5 mb-0.5" data-legend="inflation"><div class="legend-swatch w-4 h-3 border border-gray-400" style="background:#bbb;"></div> &Omega;<sub>&Lambda;<sub>i</sub></sub> (inflation)</div>
      <div class="legend-item flex items-center gap-1.5 mb-0.5" data-legend="radiation"><div class="legend-swatch w-4 h-3 border border-gray-400" style="background:#d4a0a0;"></div> &Omega;<sub>r</sub> (radiation)</div>
      <div class="legend-item flex items-center gap-1.5 mb-0.5" data-legend="matter"><div class="legend-swatch w-4 h-3 border border-gray-400" style="background:#a0b8d4;"></div> &Omega;<sub>m</sub> (matter)</div>
      <div class="legend-item flex items-center gap-1.5" data-legend="darkenergy"><div class="legend-swatch w-4 h-3 border border-gray-400" style="background:#ccc;"></div> &Omega;<sub>&Lambda;</sub> (dark energy)</div>
    </div>
    <div class="hint-bar absolute bottom-2 left-20 text-[10px] text-gray-400 z-10">Scroll to zoom &middot; Drag to pan &middot; Hover for info &middot; Click for Wikipedia &middot; Press <strong>?</strong> for keyboard shortcuts</div>
  </div>
</div>

<!-- Slideshow overlay -->
<div id="slideshow-overlay" class="fixed inset-0 z-[250] bg-black/60 backdrop-blur-sm flex items-center justify-center transition-opacity duration-400" style="display:none; opacity:0;">
  <div class="bg-white rounded-xl shadow-2xl max-w-md w-[90%] p-8 relative">
    <button id="slide-skip" class="absolute top-3 right-4 text-gray-400 hover:text-gray-600 text-xs transition-colors">Skip</button>
    <h2 id="slide-title" class="text-xl font-semibold text-gray-800 mb-3"></h2>
    <p id="slide-text" class="text-sm text-gray-600 leading-relaxed mb-6"></p>
    <div class="flex items-center justify-between">
      <button id="slide-prev" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">&larr; Back</button>
      <div id="slide-dots" class="flex items-center gap-1.5"></div>
      <button id="slide-next" class="text-xs bg-red-800 text-white px-4 py-1.5 rounded-full hover:bg-red-900 transition-colors">Next</button>
    </div>
  </div>
</div>

<script src="js/constants.js"></script>
<script src="js/tooltips.js"></script>
<script src="js/chart.js"></script>
<script src="js/slideshow.js"></script>
<script src="js/keyboard.js"></script>
<script>
  Journal.init();
  initSlideshow();
  initKeyboard();
  initDeepLinks();

  // Legend tooltips
  (function() {
    const legendDescs = {
      inflation: {
        title: "Inflationary Epoch",
        desc: "The Universe underwent exponential expansion driven by a scalar field (inflaton) in the first ~10\u207B\u00B3\u00B2 seconds, expanding by a factor of ~10\u00B2\u2076. This era explains the flatness, horizon, and monopole problems of standard Big Bang cosmology.",
        wiki: "Inflation_(cosmology)"
      },
      radiation: {
        title: "Radiation Domination",
        desc: "From the end of inflation to ~47,000 years after the Big Bang, the energy density was dominated by photons and relativistic particles. Key events include baryogenesis, Big Bang nucleosynthesis, and neutrino decoupling.",
        wiki: "Radiation-dominated_era"
      },
      matter: {
        title: "Matter Domination",
        desc: "From ~47,000 years to ~9.8 billion years, non-relativistic matter (dark matter and baryonic matter) dominated. Gravitational collapse of dark matter halos drove galaxy and large-scale structure formation.",
        wiki: "Matter-dominated_era"
      },
      darkenergy: {
        title: "Dark Energy Domination",
        desc: "The current era, beginning ~9.8 billion years after the Big Bang (~3.8 Gyr ago). Dark energy causes the expansion of the Universe to accelerate. ~68% of the total energy density today is dark energy.",
        wiki: "Dark_energy"
      }
    };
    const tooltip = document.getElementById('tooltip');
    document.querySelectorAll('.legend-item').forEach(function(item) {
      const key = item.dataset.legend;
      const info = legendDescs[key];
      if (!info) return;
      item.addEventListener('mouseenter', function(event) {
        App._tooltipStaleAfterZoom = false;
        tooltip.className = 'tooltip';
        tooltip.innerHTML = '<div class="tt-body">' +
          '<div class="tt-title">' + info.title + '</div>' +
          '<div class="tt-desc">' + info.desc + '</div>' +
          '<div class="tt-wiki-link">Click to open Wikipedia \u2197</div>' +
          '</div>';
        positionTooltip(event);
        tooltip.classList.add('tt-visible');
      });
      item.addEventListener('mousemove', positionTooltip);
      item.addEventListener('mouseleave', function() {
        tooltip.className = 'tooltip';
      });
      item.addEventListener('click', function() {
        window.open('https://en.wikipedia.org/wiki/' + info.wiki, '_blank');
      });
    });
  })();
</script>
</body>
</html>
